# ============================================================
# 后端应用 spzx-manager
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spzx-manager
  labels:
    app: spzx-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spzx-manager
  template:
    metadata:
      labels:
        app: spzx-manager
    spec:
      containers:
        - name: spzx-manager
          image: spzx-manager:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8502
          env:
            - name: SERVER_PORT
              value: "8502"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://host.docker.internal:3306/db_spzx?characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: "root123456"
            - name: SPRING_DATA_REDIS_HOST
              value: host.docker.internal
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            # ---- JVM 启动参数（容器内最小化内存占用）----
            - name: JAVA_OPTS
              value: >-
                -XX:+UseContainerSupport
                -XX:MaxRAMPercentage=75.0
                -XX:InitialRAMPercentage=50.0
                -XX:MinRAMPercentage=25.0
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=200
                -XX:+ParallelRefProcEnabled
                -XX:+DisableExplicitGC
                -XX:+AlwaysPreTouch
                -Djava.security.egd=file:/dev/./urandom
                -XX:+TieredCompilation
                -XX:TieredStopAtLevel=1
                -Dspring.jmx.enabled=false
                -Dfile.encoding=UTF-8
                -Duser.timezone=Asia/Shanghai
          resources:
            requests: { cpu: 50m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          startupProbe:
            httpGet:
              path: /
              port: 8502
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /
              port: 8502
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8502
            periodSeconds: 30
            failureThreshold: 3
---
# Service：NodePort 30852，本机浏览器访问 http://localhost:30852
apiVersion: v1
kind: Service
metadata:
  name: spzx-manager
spec:
  type: NodePort
  selector:
    app: spzx-manager
  ports:
    - port: 8502
      targetPort: 8502
      nodePort: 30852
